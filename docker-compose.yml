services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    image: cmsc129-lab4-backend:latest
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=development

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    image: cmsc129-lab4-frontend:latest
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
    depends_on:
      - backend